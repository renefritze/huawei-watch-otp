name: Build HAP

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up HarmonyOS toolchain (ohpm + hvigorw)
        uses: eclipse-oniro4openharmony/oh-app-action@409b744e155b8d14cdb22911b95f99fbc2976777
        with:
          install-dependencies: 'false'

      # ── Signing material ──────────────────────────────────────────────
      - name: Restore signing files
        run: |
          mkdir -p signing
          python3 -c "import base64,os,pathlib; pathlib.Path('signing/otp_watch.p12').write_bytes(base64.b64decode(os.environ['SIGNING_KEYSTORE_B64']))"
          python3 -c "import base64,os,pathlib; pathlib.Path('signing/otp_watch.cer').write_bytes(base64.b64decode(os.environ['SIGNING_CERT_B64']))"
          python3 -c "import base64,os,pathlib; pathlib.Path('signing/profile.p7b').write_bytes(base64.b64decode(os.environ['SIGNING_PROFILE_B64']))"
        env:
          SIGNING_KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE_B64 }}
          SIGNING_CERT_B64: ${{ secrets.SIGNING_CERT_B64 }}
          SIGNING_PROFILE_B64: ${{ secrets.SIGNING_PROFILE_B64 }}

      - name: Inject signing passwords into build-profile.json5
        run: |
          perl -pi -e 's/__STORE_PASSWORD__/$ENV{SIGNING_STORE_PASSWORD}/g' build-profile.json5
          perl -pi -e 's/__KEY_PASSWORD__/$ENV{SIGNING_KEY_PASSWORD}/g' build-profile.json5
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      # ── Build ─────────────────────────────────────────────────────────
      - name: Configure ohpm registry
        run: |
          ohpm config set registry https://ohpm.openharmony.cn/ohpm/
          ohpm config set @ohos:registry https://repo.harmonyos.com/npm/

      - name: Install dependencies
        run: ohpm install --all

      - name: Print hvigorw version
        run: hvigorw --version --accept-license

      - name: Clean
        run: hvigorw clean --no-parallel --no-daemon

      - name: Assemble HAP
        run: >
          hvigorw assembleHap
          --mode module
          -p product=default
          --no-parallel
          --no-daemon
          --stacktrace

      # ── Artifact ──────────────────────────────────────────────────────
      - name: Upload HAP artifact
        uses: actions/upload-artifact@v4
        with:
          name: otp-watch-hap
          path: entry/build/default/outputs/default/*.hap
          if-no-files-found: error
